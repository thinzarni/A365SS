services:
  - type: web
    name: hr-requests-client
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_APP_ENV
        value: prod
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

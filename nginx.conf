server {
    listen 80;
    server_name localhost;

    # Gzip compression for faster loading
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Define the global root so all location blocks (including the caching regex) can find files
    root /usr/share/nginx/html;

    # Serve the React application under the /a365ss subpath
    location /a365ss {
        index index.html;
        try_files $uri $uri/ /a365ss/index.html;
    }

    # Redirect requests to the root directory to /a365ss
    location = / {
        return 301 /a365ss/;
    }

    # Optional: Cache static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}

server {
    listen 8082;
    server_name localhost;

    # Gzip compression for faster loading
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ── React app (A365SS) at /a365ss ──
    # Proxied to the a365ss-web container (port 80 inside Docker network)
    location /a365ss {
        proxy_pass http://a365ss-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Angular app at / ──
    # Proxied to the angular container (port 80 inside Docker network)
    location / {
        proxy_pass http://angular-app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
